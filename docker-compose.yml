services:
  # PostgreSQL Database
  postgres:
    image: postgres:18-alpine
    container_name: tutor_postgres
    environment:
      POSTGRES_USER: tutor_user
      POSTGRES_PASSWORD: tutor_pass
      POSTGRES_DB: tutor_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tutor_user -d tutor_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:8.6-alpine
    container_name: tutor_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Go Backend
  backend:
    build: ./backend
    container_name: tutor_backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=tutor_user
      - DB_PASSWORD=tutor_pass
      - DB_NAME=tutor_db
      - REDIS_ADDR=redis:6379
      - JWT_SECRET=tutor-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    command: air

  # React Frontend
  frontend:
    build: ./frontend
    container_name: tutor_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8080

volumes:
  postgres_data:
  redis_data:
